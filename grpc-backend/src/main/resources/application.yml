spring:
    application:
        name: grpc-backend

server:
    port: 19091

grpc:
    server:
        port: 29090

management:
    endpoints:
        web:
            exposure:
                include: health,info,prometheus
    endpoint:
        health:
            show-details: always

logging:
    file:
        # 未指定時は observability/logs 配下へ出力する。
        name: ${APP_LOG_FILE:../observability/logs/grpc-backend.log}
    pattern:
        # OTel Java Agent が MDC に入れる trace_id / span_id を 1 行ログへ残す。
        console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} level=%level service=grpc-backend trace_id=%X{trace_id} span_id=%X{span_id} logger=%logger{36} thread=%thread message=%msg%n"
        file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} level=%level service=grpc-backend trace_id=%X{trace_id} span_id=%X{span_id} logger=%logger{36} thread=%thread message=%msg%n"
    logback:
        rollingpolicy:
            # ローカル検証で肥大化しすぎないようにローテーションする。
            file-name-pattern: ${APP_LOG_FILE_PATTERN:../observability/logs/grpc-backend.%d{yyyy-MM-dd}.%i.log}
            max-file-size: 10MB
            max-history: 7
            total-size-cap: 100MB
            clean-history-on-start: false
