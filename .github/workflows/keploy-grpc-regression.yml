name: Keploy Regression

on:
  pull_request:
    paths:
      - ".github/workflows/keploy-grpc-regression.yml"
      - ".github/scripts/run-keploy-grpc-regression.sh"
      - "bff/**"
      - "rest-backend/**"
      - "grpc-backend/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/keploy-grpc-regression.yml"
      - ".github/scripts/run-keploy-grpc-regression.sh"
      - "bff/**"
      - "rest-backend/**"
      - "grpc-backend/**"
  workflow_dispatch:
    inputs:
      run_target:
        description: "実行対象"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - grpc
          - rest

jobs:
  keploy-grpc-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      # 正本は test-set-rest とする。
      KEPLOY_TEST_SET: test-set-rest
      # 通常 CI は rest -> grpc の順で直列実行し、手動実行時だけ対象を絞れるようにする。
      KEPLOY_RUN_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.run_target || 'both' }}
      # Gradle 起動を伴うため、Keploy の待機は少し長めに取る。
      KEPLOY_DELAY: "80"
      # REST backend の起動待ち上限。
      REST_READY_TIMEOUT: "180"
      # gRPC backend の起動待ち上限。
      GRPC_READY_TIMEOUT: "180"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Keploy CLI
        run: |
          curl --silent --location "https://github.com/keploy/keploy/releases/latest/download/keploy_linux_amd64.tar.gz" | tar xz --overwrite -C /tmp
          sudo install -m 0755 /tmp/keploy /usr/local/bin/keploy
          keploy --version

      - name: Run Keploy regression in rest mode
        if: env.KEPLOY_RUN_TARGET == 'both' || env.KEPLOY_RUN_TARGET == 'rest'
        env:
          BFF_CALL_MODE: rest
          RUN_LABEL: rest
        run: bash .github/scripts/run-keploy-grpc-regression.sh

      - name: Run Keploy regression in grpc mode
        if: env.KEPLOY_RUN_TARGET == 'both' || env.KEPLOY_RUN_TARGET == 'grpc'
        env:
          BFF_CALL_MODE: grpc
          RUN_LABEL: grpc
        run: bash .github/scripts/run-keploy-grpc-regression.sh

      - name: Upload Keploy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keploy-grpc-regression-artifacts
          if-no-files-found: warn
          path: |
            artifacts/ci/keploy-regression
            bff/keploy/reports
            observability/logs
