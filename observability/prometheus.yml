global:
    scrape_interval: 5s
    evaluation_interval: 5s

scrape_configs:
    - job_name: prometheus
      static_configs:
          - targets:
                - prometheus:9090

    - job_name: otel-collector
      static_configs:
          - targets:
                - otel-collector:9464

    - job_name: tempo
      metrics_path: /metrics
      static_configs:
          - targets:
                - tempo:3200

    - job_name: loki
      metrics_path: /metrics
      static_configs:
          - targets:
                - loki:3100

    - job_name: bff
      metrics_path: /actuator/prometheus
      static_configs:
          - targets:
                - host.docker.internal:19090

    - job_name: rest-backend
      metrics_path: /actuator/prometheus
      static_configs:
          - targets:
                - host.docker.internal:19092

    - job_name: grpc-backend
      metrics_path: /actuator/prometheus
      static_configs:
          - targets:
                - host.docker.internal:19091
